name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'OP Replay Clipper v__VERSION__'
          releaseBody: |
            ## Native Desktop App (No Docker Required)

            Download the installer for your platform. The app launches a local web server
            and opens the clipper UI — no Docker, no containers, direct GPU access.

            ### Downloads

            | Platform | Format | Notes |
            |----------|--------|-------|
            | **Linux** | `.AppImage` | Portable, run anywhere |
            | **Linux** | `.deb` | Ubuntu, Debian, Mint, Pop!_OS |
            | **Linux** | `.rpm` | Fedora, RHEL |
            | **macOS** | `.dmg` | Apple Silicon + Intel |
            | **Windows** | `.msi` | Windows 10/11 installer |
            | **Windows** | `.exe` | NSIS installer |

            ### Prerequisites

            1. Clone and install the native clipper:
               - **Linux/macOS**: `git clone https://github.com/mhayden123/op-replay-clipper-native && cd op-replay-clipper-native && ./install.sh`
               - **Windows**: `git clone https://github.com/mhayden123/op-replay-clipper-native && cd op-replay-clipper-native && python install_windows.py`
            2. Run the desktop app — it finds the clipper project and starts the server automatically.

            ### Platform Notes

            - **Linux**: Full support — all render types, NVIDIA GPU acceleration (NVENC)
            - **macOS**: All render types, VideoToolbox hardware acceleration
            - **Windows**: Non-UI renders native, UI renders (ui, ui-alt, driver-debug) require WSL
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
