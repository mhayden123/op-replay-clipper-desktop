name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Inject version from git tag
        shell: bash
        run: |
          # Extract version from tag: v0.1.4-beta -> 0.1.4, v1.2.3 -> 1.2.3
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"          # strip leading v
          VERSION="${VERSION%%-*}"    # strip -beta, -alpha, -rc suffix
          echo "VERSION=$VERSION"
          # Write into tauri.conf.json
          cd src-tauri
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            console.log('Set version to: ' + conf.version);
          "

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload macOS artifacts (aarch64)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-aarch64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload macOS artifacts (x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "GlideKit ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
          files: |
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
          body: |
            ## Native Desktop App (No Docker Required)

            Download the installer for your platform. The app launches a local web server
            and opens the clipper UI — no Docker, no containers, direct GPU access.

            ### Downloads

            | Platform | Format | Notes |
            |----------|--------|-------|
            | **Linux** | `.AppImage` | Portable, run anywhere |
            | **Linux** | `.deb` | Ubuntu, Debian, Mint, Pop!_OS |
            | **Linux** | `.rpm` | Fedora, RHEL |
            | **macOS (Apple Silicon)** | `.dmg` | M1/M2/M3/M4 |
            | **macOS (Intel)** | `.dmg` | Intel Macs |
            | **Windows** | `.msi` | Windows 10/11 installer |
            | **Windows** | `.exe` | NSIS installer |

            ### Prerequisites

            1. Clone and install the native clipper first:
               - **Linux/macOS**: `git clone https://github.com/mhayden123/glidekit && cd glidekit && ./install.sh`
               - **Windows**: `git clone https://github.com/mhayden123/glidekit && cd glidekit && python install_windows.py`
            2. Run the desktop app — it finds the clipper project and starts the server automatically.

            ### Platform Notes

            - **Linux**: Full support — all render types, NVIDIA GPU acceleration (NVENC)
            - **macOS**: All render types, VideoToolbox hardware acceleration
            - **Windows**: Non-UI renders native, UI renders (ui, ui-alt, driver-debug) require WSL
